<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <script type="module">
    import { Transaction, PrivateKey, config } from 'https://cdn.jsdelivr.net/npm/hive-tx@7/dist/index.mjs'
    window.hiveTx = hiveTx
  </script>
  <title>Test hive-tx</title>
</head>

<body>
  <script>
    // change api
    config.nodes = ['https://rpc.mahdiyari.info']
    const myKey = '5JRaypasxMx1L97ZUX7YuC5Psb5EAbF821kkAGtBj7xCJFQcbLg'
    const privateKey = PrivateKey.from(myKey)

    const tx = new Transaction()

    // create transaction
    tx.addOperation('vote',
      {
        voter: 'guest123',
        author: 'guest123',
        permlink: '20191107t125713486z-post',
        weight: 9900
      }).then(() => {
        console.log('Created transaction:', tx.transaction)

        // sign the transaction
        tx.sign(privateKey)

        // broadcast the transaction
        tx.broadcast().then(res => console.log('Broadcast result:', res))
      })

    // get accounts
    hiveTx
      .callRPC('condenser_api.get_accounts', [['mahdiyari']])
      .then(res => console.log('Get accounts:', res))
  </script>
</body>

</html>
